{% extends 'base.html' %}

{% block title %}Удалить объявление{% endblock %}

{% block content %}
<div class="detail-page">
    <h1 class="page-title">Удалить объявление</h1>
    <p>Вы уверены, что хотите удалить объявление <strong>«{{ listing.title }}»</strong>?</p>
    <p>Это действие нельзя отменить.</p>

    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'dashboard' %}" class="btn btn-primary">Отмена</a>
    </form>
</div>
{% endblock %}
